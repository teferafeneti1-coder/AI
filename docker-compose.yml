version: "3.9"

services:
  # ── gRPC Analysis Server ─────────────────────────────────────────────────────
  grpc-server:
    build:
      context: .
      dockerfile: grpc_server/Dockerfile
    container_name: hids_grpc_server
    hostname: grpc-server
    ports:
      - "50051:50051"
    environment:
      GRPC_PORT: 50051
      HMAC_SECRET: shared-dev-secret
      LOG_LEVEL: INFO
    networks:
      - hids_net
    volumes:
      - ./grpc_server:/app

  # ── Audit Log Service ────────────────────────────────────────────────────────
  audit-log:
    build:
      context: .
      dockerfile: audit_log_service/Dockerfile
    container_name: hids_audit_log
    hostname: audit-log
    depends_on:
      - grpc-server
    environment:
      GRPC_SERVER_HOST: grpc-server
      GRPC_SERVER_PORT: 50051
      POLL_INTERVAL: 3
      PLATFORM: simulated
      LOG_LEVEL: INFO
    networks:
      - hids_net
    volumes:
      - ./audit_log_service:/app

  # ── HIDS Node (Dashboard) ────────────────────────────────────────────────────
  hids-node:
    build:
      context: .
      dockerfile: hids_node/Dockerfile
    container_name: hids_node
    hostname: hids-node
    depends_on:
      - grpc-server
      - agent-node
    ports:
      - "5000:5000"
    environment:
      GRPC_SERVER_HOST: grpc-server
      GRPC_SERVER_PORT: 50051
      AGENT_HOST: agent-node
      AGENT_PORT: 50052
      WEB_HOST: 0.0.0.0
      WEB_PORT: 5000
      HMAC_SECRET: shared-dev-secret
      LOG_LEVEL: INFO
    networks:
      - hids_net
    volumes:
      - ./hids_node:/app

  # ── Agent Node ───────────────────────────────────────────────────────────────
  agent-node:
    build:
      context: .
      dockerfile: agent_node/Dockerfile
    container_name: hids_agent
    hostname: agent-node
    ports:
      - "50052:50052"
    environment:
      AGENT_PORT: 50052
      HMAC_SECRET: shared-dev-secret
      LOG_LEVEL: INFO
    networks:
      - hids_net
    volumes:
      - ./agent_node:/app

networks:
  hids_net:
    driver: bridge
